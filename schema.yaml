_profile: &profile
  type: pubkey
  required: true
  next:
    type: relay
    next:
      type: free  # petname

_external: &external
  type: free
  required: true
  next:
    type: url

_event: &event
  type: id
  required: true
  next:
    type: relay
    next:
      type: pubkey

_addr: &addr
  type: addr
  required: true
  next:
    type: relay

_kind: &kind
  type: kind
  required: true

_rtag: &rtag
  name: r
  next:
    type: url
    required: true

_relaytag: &relaytag
  name: relay
  next:
    type: relay
    required: true

_imetatag: &imetatag
  name: imeta
  next:
    type: imeta
    required: true
    variadic: true
  description: metadata about media items present in the event, each tag item is a space-separated key-value pair

_emojitag: &emojitag
  name: emoji
  next:
    type: free
    required: true
    next:
      type: url
      required: true
  description: emojis references used inside the .content

_title: &titletag
  name: title
  next:
    type: free

_image: &imagetag
  name: image
  next:
    type: url
    required: true

_description: &descriptiontag
  name: description
  next:
    type: free
    required: true

_summary: &summarytag
  name: summary
  next:
    type: free
    required: true

_publishedattag: &publishedattag
  name: published_at
  next:
    type: timestamp
    required: true
  description: when an event is replaced, the stringified timestamp of the original event

_atag: &atag
  name: a
  next: *addr

_ptag: &ptag
  name: p
  next: *profile

_etag: &etag
  name: e
  next: *event

_qtag: &qtag
  name: q
  next: *event

_ktag: &ktag
  name: k
  next: *kind
  description: kind of the event being replied to or referenced

_gtag: &gtag
  name: g
  next:
    type: geohash
    required: true

_servertag: &servertag
  name: server
  next:
    type: url
    required: true

_pathtag: &pathtag
  name: path
  next:
    type: lowercase
    required: true
    next:
      type: hex
      required: true

_sourcetag: &sourcetag
  name: source
  next:
    type: url
    required: true

_ptag-bare: &ptag-bare
  name: p
  next:
    type: pubkey
    required: true

_etag-bare: &etag-bare
  name: e
  next:
    type: id
    required: true

_atag-bare: &atag-bare
  name: a
  next:
    type: addr
    required: true

generic_tags:
  t:
    type: lowercase
    required: true
  L:
    type: free
    required: true
  l:
    type: lowercase
    required: true
    next:
